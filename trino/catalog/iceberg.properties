# Iceberg catalog backed by MinIO (S3-compatible)
# Start MinIO first: docker compose --profile full up -d minio
connector.name=iceberg
iceberg.catalog.type=rest
# Uncomment and configure when using a REST catalog (e.g. Nessie, Polaris):
# iceberg.rest-catalog.uri=http://nessie:19120/api/v1
# For local MinIO-backed Hive metastore, use hive catalog type instead:
# connector.name=iceberg
# iceberg.catalog.type=hive_metastore
# hive.metastore.uri=thrift://hive-metastore:9083
