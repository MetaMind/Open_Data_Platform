apiVersion: v1
kind: Secret
metadata:
  name: {{ include "metamind.fullname" . }}-secrets
  labels:
    {{- include "metamind.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  # Override in production via --set or external secrets operator
  # Values here are base64-encoded placeholders
  secret-key: {{ "change-me-in-production" | b64enc | quote }}
