name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black mypy
    
    - name: Lint with ruff
      run: ruff check metamind/
    
    - name: Format check with black
      run: black --check metamind/
    
    - name: Type check with mypy
      run: mypy metamind/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: metamind
          POSTGRES_PASSWORD: metamind
          POSTGRES_DB: metamind
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov httpx
    
    - name: Run migrations
      env:
        PGPASSWORD: metamind
      run: |
        ./scripts/apply_migrations.sh
    
    - name: Run unit tests
      env:
        METAMIND_DB__HOST: localhost
        METAMIND_DB__PASSWORD: metamind
        METAMIND_REDIS__HOST: localhost
      run: |
        pytest tests/unit -v --cov=metamind --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml

  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Validate imports
      run: python scripts/validate_imports.py
    
    - name: Quality check
      run: python scripts/quality_check.py
    
    - name: Compile all Python files
      run: |
        python -m py_compile $(find metamind -name "*.py" | grep -v __pycache__)

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, validate]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: metamind:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
