global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'metamind'
    static_configs:
      - targets: ['metamind:8000']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'trino'
    static_configs:
      - targets: ['trino:8080']
    metrics_path: /metrics
    scrape_interval: 15s
