<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetaMind — Query Trace Viewer</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3147;
      --accent: #6c8eff;
      --green: #4ade80;
      --yellow: #facc15;
      --red: #f87171;
      --text: #e2e8f0;
      --muted: #64748b;
      --font: 'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; }
    header { padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 16px; font-weight: 600; color: var(--accent); }
    header span { color: var(--muted); font-size: 12px; }
    .toolbar { padding: 12px 24px; display: flex; gap: 10px; flex-wrap: wrap; background: var(--surface); border-bottom: 1px solid var(--border); }
    input, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 12px; outline: none; }
    input:focus, select:focus { border-color: var(--accent); }
    button { background: var(--accent); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; }
    button.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge.fast { background: #14532d; color: var(--green); }
    .badge.slow { background: #422006; color: var(--yellow); }
    .badge.error { background: #450a0a; color: var(--red); }
    main { display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 120px); }
    #trace-list { overflow-y: auto; border-right: 1px solid var(--border); }
    .trace-row { padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
    .trace-row:hover, .trace-row.selected { background: var(--surface); }
    .trace-row .tid { font-weight: 600; color: var(--accent); font-size: 11px; font-family: monospace; }
    .trace-row .meta { color: var(--muted); font-size: 11px; margin-top: 3px; }
    .trace-row .dur { float: right; font-weight: 600; }
    #detail { overflow-y: auto; padding: 20px 24px; }
    #detail h2 { font-size: 14px; margin-bottom: 16px; color: var(--accent); }
    .waterfall { position: relative; }
    .span-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; border-bottom: 1px solid var(--border); }
    .span-name { width: 220px; flex-shrink: 0; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .span-bar-wrap { flex: 1; height: 18px; background: var(--bg); border-radius: 3px; overflow: hidden; position: relative; }
    .span-bar { height: 100%; border-radius: 3px; background: var(--accent); opacity: .75; }
    .span-ms { width: 60px; text-align: right; font-size: 11px; color: var(--muted); }
    .empty { color: var(--muted); text-align: center; margin-top: 80px; }
    #status { padding: 8px 24px; font-size: 11px; color: var(--muted); background: var(--surface); border-top: 1px solid var(--border); }
    .auto-badge { display: inline-block; padding: 2px 6px; background: #1e293b; border-radius: 4px; color: var(--green); font-size: 10px; margin-left: 6px; }
  </style>
</head>
<body>
<header>
  <h1>🔭 MetaMind Trace Viewer</h1>
  <span id="last-refresh">Loading…</span>
  <span class="auto-badge" id="auto-indicator">AUTO-REFRESH ON</span>
</header>

<div class="toolbar">
  <input id="f-tenant" placeholder="tenant_id filter" style="width:160px" />
  <input id="f-query" placeholder="query_id filter" style="width:180px" />
  <input id="f-min-dur" type="number" placeholder="min duration ms" style="width:130px" />
  <select id="f-limit">
    <option value="25">25 traces</option>
    <option value="50" selected>50 traces</option>
    <option value="100">100 traces</option>
  </select>
  <button onclick="fetchTraces()">🔍 Search</button>
  <button class="secondary" onclick="toggleAutoRefresh()">⏸ Pause</button>
</div>

<main>
  <div id="trace-list"><div class="empty" style="padding:40px">Loading traces…</div></div>
  <div id="detail"><div class="empty">← Select a trace to view spans</div></div>
</main>

<div id="status">Ready</div>

<script>
  let autoRefresh = true;
  let refreshTimer = null;
  let selectedTraceId = null;
  let allTraces = [];

  function durClass(ms) {
    if (ms > 5000) return 'error';
    if (ms > 1000) return 'slow';
    return 'fast';
  }
  function fmsDur(ms) {
    if (ms >= 1000) return (ms / 1000).toFixed(2) + 's';
    return Math.round(ms) + 'ms';
  }

  async function fetchTraces() {
    const tenant = document.getElementById('f-tenant').value.trim();
    const query  = document.getElementById('f-query').value.trim();
    const minDur = document.getElementById('f-min-dur').value.trim();
    const limit  = document.getElementById('f-limit').value;

    let url = `/api/v1/traces?limit=${limit}`;
    if (tenant) url += `&tenant_id=${encodeURIComponent(tenant)}`;
    if (query)  url += `&query_id=${encodeURIComponent(query)}`;
    if (minDur) url += `&min_duration_ms=${encodeURIComponent(minDur)}`;

    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      allTraces = await resp.json();
      renderList(allTraces);
      document.getElementById('last-refresh').textContent =
        'Last refresh: ' + new Date().toLocaleTimeString();
      document.getElementById('status').textContent =
        `Showing ${allTraces.length} traces`;
    } catch (e) {
      document.getElementById('status').textContent = 'Error: ' + e.message;
    }
  }

  function renderList(traces) {
    const el = document.getElementById('trace-list');
    if (!traces.length) {
      el.innerHTML = '<div class="empty" style="padding:40px">No traces found</div>';
      return;
    }
    el.innerHTML = traces.map(t => {
      const dur = t.duration_ms || 0;
      const cls = durClass(dur);
      const sel = t.query_id === selectedTraceId ? ' selected' : '';
      return `<div class="trace-row${sel}" onclick="selectTrace('${t.query_id || t.trace_id}')">
        <span class="dur"><span class="badge ${cls}">${fmsDur(dur)}</span></span>
        <div class="tid">${(t.query_id || t.trace_id || '—').substring(0, 20)}</div>
        <div class="meta">${t.tenant_id || '—'} · ${t.backend_used || t.engine || '—'} · ${t.executed_at || t.start_time || ''}</div>
      </div>`;
    }).join('');
  }

  async function selectTrace(traceId) {
    selectedTraceId = traceId;
    // Re-render list to update selection highlight
    renderList(allTraces);

    const detail = document.getElementById('detail');
    detail.innerHTML = '<div class="empty">Loading span tree…</div>';

    try {
      const resp = await fetch(`/api/v1/traces/${encodeURIComponent(traceId)}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      renderDetail(data);
    } catch (e) {
      detail.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
    }
  }

  function renderDetail(data) {
    const spans = data.spans || [];
    if (!spans.length) {
      document.getElementById('detail').innerHTML =
        '<div class="empty">No spans found for this trace</div>';
      return;
    }

    const maxDur = Math.max(...spans.map(s => s.duration_ms || 0), 1);

    const rows = spans.map(s => {
      const dur = s.duration_ms || 0;
      const pct = Math.round((dur / maxDur) * 100);
      const name = s.name || s.operation || s.stage || 'span';
      const cls = durClass(dur);
      return `<div class="span-row">
        <div class="span-name" title="${name}">${name}</div>
        <div class="span-bar-wrap">
          <div class="span-bar ${cls}" style="width:${pct}%"></div>
        </div>
        <div class="span-ms"><span class="badge ${cls}">${fmsDur(dur)}</span></div>
      </div>`;
    }).join('');

    document.getElementById('detail').innerHTML = `
      <h2>🔎 Trace: ${data.trace_id} &nbsp;·&nbsp; ${data.span_count} spans</h2>
      <div class="waterfall">${rows}</div>`;
  }

  function toggleAutoRefresh() {
    autoRefresh = !autoRefresh;
    const btn = document.querySelector('button.secondary');
    const badge = document.getElementById('auto-indicator');
    if (autoRefresh) {
      btn.textContent = '⏸ Pause';
      badge.textContent = 'AUTO-REFRESH ON';
      badge.style.color = 'var(--green)';
      scheduleRefresh();
    } else {
      btn.textContent = '▶ Resume';
      badge.textContent = 'AUTO-REFRESH OFF';
      badge.style.color = 'var(--muted)';
      clearTimeout(refreshTimer);
    }
  }

  function scheduleRefresh() {
    clearTimeout(refreshTimer);
    if (autoRefresh) {
      refreshTimer = setTimeout(() => { fetchTraces(); scheduleRefresh(); }, 5000);
    }
  }

  // Initial load
  fetchTraces();
  scheduleRefresh();
</script>
</body>
</html>
